[node]
name = "Хаб-177"
id = ""
profile = "default"
workspace = "."
session_dir = ".waters/sessions"
llm_provider = "auto"

[chat]
# transport: stdin | telegram | whatsapp | wechat
transport = "telegram"
token = "{env:TELEGRAM_BOT_TOKEN}"
phone_number_id = "{env:WHATSAPP_PHONE_ID}"
app_id = "{env:WECHAT_APP_ID}"
app_secret = "{env:WECHAT_APP_SECRET}"

[profiles.default]
llm_provider = "deepseek"
llm_model = "deepseek-chat"
bridges = ["duckduckgo"]
autonomy_level = 0
